name: Inject Google Analytics and Tag Manager

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  inject-analytics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Inject GA4, GTM and conversion tracking
        shell: python
        run: |
          from pathlib import Path
          import re

          OLD_GA_ID = "G-SHGP6KM962"
          GA_ID = "G-SHGP6KW962"
          GTM_ID = "GTM-WZ5RPX4C"

          ga = f'''<!-- Google Analytics - Grupo Nostradamus -->
          <script async src="https://www.googletagmanager.com/gtag/js?id={GA_ID}"></script>
          <script>
            window.dataLayer = window.dataLayer || [];
            function gtag(){{dataLayer.push(arguments);}}
            gtag("js", new Date());
            gtag("config", "{GA_ID}", {{ anonymize_ip: true }});
          </script>
          <!-- /Google Analytics - Grupo Nostradamus -->'''

          gtm_head = f'''<!-- Google Tag Manager - Grupo Nostradamus -->
          <script>
          (function(w,d,s,l,i){{w[l]=w[l]||[];w[l].push({{'gtm.start':new Date().getTime(),event:'gtm.js'}});var f=d.getElementsByTagName(s)[0],j=d.createElement(s),dl=l!='dataLayer'?'&l='+l:'';j.async=true;j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);}})(window,document,'script','dataLayer','{GTM_ID}');
          </script>
          <!-- /Google Tag Manager - Grupo Nostradamus -->'''

          gtm_body = f'''<!-- Google Tag Manager (noscript) - Grupo Nostradamus -->
          <noscript><iframe src="https://www.googletagmanager.com/ns.html?id={GTM_ID}"
          height="0" width="0" style="display:none;visibility:hidden"></iframe></noscript>
          <!-- /Google Tag Manager (noscript) - Grupo Nostradamus -->'''

          tracking = '''<!-- Conversion tracking - Grupo Nostradamus -->
          <script>
          (function(){
            function cleanText(value){return (value || "").replace(/\s+/g," ").trim().slice(0,120);}
            function pageName(){var p=location.pathname||"/";return (p==="/"||p.endsWith("/"))?"home":(p.split("/").pop().replace(".html","")||"home");}
            function sendEvent(name, params){
              if(typeof window.gtag!=="function") return;
              window.gtag("event", name, Object.assign({page_name: pageName(), page_path: location.pathname, page_url: location.href}, params || {}));
            }
            document.addEventListener("click", function(event){
              var link = event.target && event.target.closest ? event.target.closest("a") : null;
              if(!link || !link.href) return;
              var href = link.href.toLowerCase();
              var text = (link.textContent || "").toLowerCase();
              var label = cleanText(link.getAttribute("aria-label") || link.textContent || link.href || "sin_texto");
              if(href.indexOf("wa.me") !== -1 || href.indexOf("whatsapp") !== -1){sendEvent("click_whatsapp", {event_category:"lead", event_label:label, link_url:link.href, conversion_type:"whatsapp"}); return;}
              if(href.indexOf("clases-en-vivo.html") !== -1 || href.indexOf("teams.microsoft.com") !== -1 || text.indexOf("clases en vivo") !== -1){sendEvent("click_clases_en_vivo", {event_category:"engagement", event_label:label, link_url:link.href}); return;}
              if(text.indexOf("matric") !== -1 || text.indexOf("informes") !== -1 || text.indexOf("vacante") !== -1 || text.indexOf("quiero ingresar") !== -1 || href.indexOf("ingresa-uni.html") !== -1){sendEvent("click_comercial", {event_category:"conversion", event_label:label, link_url:link.href});}
            }, true);
          })();
          </script>
          <!-- /Conversion tracking - Grupo Nostradamus -->'''

          changed = []
          for path in Path('.').glob('*.html'):
              if path.name.lower() == 'iq100.html':
                  continue
              text = path.read_text(encoding='utf-8', errors='ignore')
              original = text

              text = text.replace(OLD_GA_ID, GA_ID)

              if GA_ID not in text and '</head>' in text:
                  text = text.replace('</head>', ga + '\n</head>', 1)

              if GTM_ID not in text and '</head>' in text:
                  text = text.replace('</head>', gtm_head + '\n</head>', 1)

              if 'Google Tag Manager (noscript) - Grupo Nostradamus' not in text and '<body' in text:
                  text = re.sub(r'(<body[^>]*>)', r'\1\n' + gtm_body, text, count=1, flags=re.IGNORECASE)

              if 'Conversion tracking - Grupo Nostradamus' not in text and '</body>' in text:
                  text = text.replace('</body>', tracking + '\n</body>', 1)

              if text != original:
                  path.write_text(text, encoding='utf-8')
                  changed.append(str(path))

          print('Updated files:', changed)

      - name: Commit changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add *.html
            git commit -m "Install Google Tag Manager"
            git push
          fi
